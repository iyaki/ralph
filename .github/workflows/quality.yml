name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - main_go-cli
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: test
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: coverage gate
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make coverage

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@latest
      - name: arch
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make arch

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: mutation
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make mutation
