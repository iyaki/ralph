name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  shell-tests:
    name: Run shell tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ralph test suite
        shell: bash
        run: ./test_ralph.sh

      - name: Run shellcheck with reviewdog
        uses: reviewdog/action-shellcheck@v1.32.0

      - name: Run shfmt with reviewdog
        uses: reviewdog/action-shfmt@v1.0.4
